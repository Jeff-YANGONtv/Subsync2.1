name: subtitle_sync
description: Subtitle Sync — PWA subtitle editor + native mobile (media_kit) with real Web Audio waveform.
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  file_picker: ^8.0.0+1
  provider: ^6.1.2
  web: ^1.0.0
  path_provider: ^2.1.3

  # Native-only (Android/iOS/desktop). On web these are pulled in by pub get
  # but never code-loaded thanks to conditional imports (`dart.library.io`).
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4
  just_waveform: ^0.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
